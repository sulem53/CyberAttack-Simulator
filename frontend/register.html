<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Organization | AttackSimulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass w-full max-w-2xl p-8 md:p-12 rounded-3xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">Create your account</h1>
            <p class="text-slate-400">Join the platform to protect your organization.</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Company Info -->
                <div class="space-y-4">
                    <h2 class="text-sm font-semibold text-blue-400 uppercase tracking-wider">Company Details</h2>
                    <div>
                        <label class="block text-sm font-medium mb-2">Company Name</label>
                        <input type="text" id="companyName" required class="input-field w-full px-4 py-3 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Company Domain</label>
                        <input type="text" id="domain" placeholder="example.com" required class="input-field w-full px-4 py-3 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Industry</label>
                        <select id="industry" class="input-field w-full px-4 py-3 rounded-xl text-white">
                            <option value="IT">IT</option>
                            <option value="Finance">Finance</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <!-- Admin Info -->
                <div class="space-y-4">
                    <h2 class="text-sm font-semibold text-blue-400 uppercase tracking-wider">Super Admin Details</h2>
                    <div>
                        <label class="block text-sm font-medium mb-2">Full Name</label>
                        <input type="text" id="adminName" required class="input-field w-full px-4 py-3 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Work Email</label>
                        <input type="email" id="adminEmail" required class="input-field w-full px-4 py-3 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <input type="password" id="password" required class="input-field w-full px-4 py-3 rounded-xl text-white">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold text-lg mt-8 transition transform hover:scale-[1.01]">
                Register Organization
            </button>
        </form>

        <p class="text-center mt-6 text-slate-400">
            Already have an account? <a href="login.html" class="text-blue-400 hover:underline">Login here</a>
        </p>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
