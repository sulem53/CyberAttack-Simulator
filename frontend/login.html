<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AttackSimulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass w-full max-w-md p-10 rounded-3xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
            <p class="text-slate-400">Log in to your security dashboard.</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2">Email Address</label>
                <input type="email" id="email" required class="input-field w-full px-4 py-3 rounded-xl text-white">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" required class="input-field w-full px-4 py-3 rounded-xl text-white">
            </div>

            <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold text-lg transition transform hover:scale-[1.01]">
                Sign In
            </button>
        </form>

        <p class="text-center mt-8 text-slate-400">
            Don't have an account? <a href="register.html" class="text-blue-400 hover:underline">Register your company</a>
        </p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
