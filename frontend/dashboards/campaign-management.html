<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Management | AttackSimulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar { background: rgba(15, 23, 42, 0.8); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-item { transition: all 0.2s ease; border-radius: 12px; }
        .nav-item:hover { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
        .status-active { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-draft { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .status-completed { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 sidebar hidden lg:flex flex-col p-6 fixed h-full z-10">
        <div class="text-xl font-bold mb-10 flex items-center space-x-2">
            <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <span>Attack<span class="text-blue-400">Simulator</span></span>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="admin.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400 font-semibold">
                <span>Dashboard</span>
            </a>
            <a href="campaign-creator.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400 font-semibold">
                <span>Campaign Creator</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 bg-blue-500/10 text-blue-400 border-l-4 border-blue-500 rounded-r-xl font-semibold">
                <span>Management</span>
            </a>
            <a href="employee-mgmt.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400 font-semibold">
                <span>Employees</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 lg:ml-64 p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold">Campaign Management</h1>
                <p class="text-slate-400">Monitor and analyze performance of active drills.</p>
            </div>
            <a href="campaign-creator.html" class="px-6 py-3 rounded-xl bg-blue-500 hover:bg-blue-600 font-bold transition">New Campaign</a>
        </header>

        <!-- Campaigns Table -->
        <div class="glass rounded-3xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-slate-400 uppercase text-xs font-bold">
                    <tr>
                        <th class="px-6 py-4">Campaign Name</th>
                        <th class="px-6 py-4">Type</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4">Recipients</th>
                        <th class="px-6 py-4">Clicks (%)</th>
                        <th class="px-6 py-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="campaignList" class="divide-y divide-white/5 font-medium">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
            <div id="loading" class="p-20 text-center text-slate-500">Loading campaigns...</div>
        </div>
    </main>

    <script src="../js/campaign-management.js"></script>
</body>
</html>
