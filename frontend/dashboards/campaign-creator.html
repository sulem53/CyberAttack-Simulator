<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Campaign | AttackSimulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar { background: rgba(15, 23, 42, 0.8); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-field:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .nav-item { transition: all 0.2s ease; border-radius: 12px; }
        .nav-item:hover { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 sidebar hidden lg:flex flex-col p-6 fixed h-full z-10">
        <div class="text-xl font-bold mb-10 flex items-center space-x-2">
            <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <span>Attack<span class="text-blue-400">Simulator</span></span>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="admin.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400 font-semibold">
                <span>Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 bg-blue-500/10 text-blue-400 border-l-4 border-blue-500 rounded-r-xl font-semibold">
                <span>Campaign Creator</span>
            </a>
            <a href="campaign-management.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400 font-semibold">
                <span>Management</span>
            </a>
            <a href="employee-mgmt.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400 font-semibold">
                <span>Employees</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 lg:ml-64 p-8">
        <header class="mb-10">
            <h1 class="text-3xl font-bold">Create New Simulation</h1>
            <p class="text-slate-400">Design a controlled attack simulation to assess risk.</p>
        </header>

        <form id="campaignForm" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Campaign Settings -->
            <div class="lg:col-span-2 space-y-8">
                <div class="glass p-8 rounded-3xl space-y-6">
                    <h2 class="text-xl font-bold border-b border-slate-800 pb-4">Manual Composer</h2>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Campaign Name</label>
                        <input type="text" id="name" required placeholder="e.g., Q1 Social Engineering Drill" class="input-field w-full px-4 py-3 rounded-xl text-white">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Attack Type</label>
                            <select id="type" class="input-field w-full px-4 py-3 rounded-xl text-white">
                                <option value="Phishing">Phishing Email</option>
                                <option value="Social Engineering">Social Engineering</option>
                                <option value="Malware">Malware Deception</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Target Departments (comma separated)</label>
                            <input type="text" id="departments" placeholder="IT, Sales, HR" class="input-field w-full px-4 py-3 rounded-xl text-white">
                        </div>
                    </div>

                    <div class="space-y-4 pt-4">
                        <h3 class="font-bold text-slate-300">Email Template</h3>
                        <div>
                            <label class="block text-sm font-medium mb-2">Subject Line</label>
                            <input type="text" id="subject" required placeholder="URGENT: Password Reset Required" class="input-field w-full px-4 py-3 rounded-xl text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Sender Display Name</label>
                            <input type="text" id="sender" required placeholder="IT Security Support" class="input-field w-full px-4 py-3 rounded-xl text-white">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Email Body (HTML supported)</label>
                            <textarea id="body" required rows="8" class="input-field w-full px-4 py-3 rounded-xl text-white" placeholder="Hello employee, your account has been compromised..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Action Sidebar -->
            <div class="space-y-6">
                <div class="glass p-8 rounded-3xl sticky top-8">
                    <h3 class="text-xl font-bold mb-6">Launch Settings</h3>
                    
                    <div class="space-y-4 mb-8">
                        <div class="flex items-center space-x-2 text-sm text-slate-400">
                            <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                            <span>Targets selected: All Employees</span>
                        </div>
                        <div class="flex items-center space-x-2 text-sm text-slate-400">
                            <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                            <span>Mode: Ethical Simulation</span>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full py-4 rounded-xl font-bold text-lg mb-4">Save as Draft</button>
                    <button type="button" id="launchBtn" class="w-full py-4 rounded-xl border border-slate-700 font-bold hover:bg-slate-800 transition">Launch Now</button>
                </div>
            </div>
        </form>
    </main>

    <script src="../js/campaign-creator.js"></script>
</body>
</html>
