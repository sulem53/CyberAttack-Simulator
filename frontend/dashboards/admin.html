<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | AttackSimulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar { background: rgba(15, 23, 42, 0.8); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .card:hover { border-color: rgba(59, 130, 246, 0.3); transform: translateY(-2px); }
        .nav-item { transition: all 0.2s ease; border-radius: 12px; }
        .nav-item:hover { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .nav-active { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border-left: 4px solid #3b82f6; border-radius: 0 12px 12px 0; }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 sidebar hidden lg:flex flex-col p-6 fixed h-full z-10">
        <div class="text-xl font-bold mb-10 flex items-center space-x-2">
            <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <span>Attack<span class="text-blue-400">Simulator</span></span>
        </div>

        <nav class="flex-1 space-y-2">
            <a href="#" class="flex items-center space-x-3 p-3 nav-active font-semibold">
                <span>Dashboard</span>
            </a>
            <a href="campaign-creator.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400">
                <span>Campaign Creator</span>
            </a>
            <a href="campaign-management.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400">
                <span>Management</span>
            </a>
            <a href="employee-mgmt.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400">
                <span>Employees</span>
            </a>
            <a href="analytics.html" class="flex items-center space-x-3 p-3 nav-item text-slate-400 font-semibold">
                <span>Analytics</span>
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-800">
            <div class="flex items-center space-x-3 mb-6">
                <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center font-bold" id="userInitial">A</div>
                <div class="overflow-hidden">
                    <p class="text-sm font-bold truncate" id="userName">Admin Name</p>
                    <p class="text-xs text-slate-500 truncate" id="userRole">Super Admin</p>
                </div>
            </div>
            <button id="logoutBtn" class="flex items-center space-x-3 p-3 nav-item text-red-400 w-full">
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 lg:ml-64 p-8">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold">Organization Overview</h1>
                <p class="text-slate-400" id="orgName">Connecting to system...</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="px-4 py-2 glass rounded-2xl text-sm font-semibold flex items-center space-x-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span>System Live</span>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="card p-6 rounded-3xl">
                <p class="text-slate-400 text-sm font-medium mb-1">Total Employees</p>
                <h3 class="text-3xl font-bold" id="statEmployees">0</h3>
            </div>
            <div class="card p-6 rounded-3xl">
                <p class="text-slate-400 text-sm font-medium mb-1">Avg Risk Score</p>
                <h3 class="text-3xl font-bold text-yellow-400" id="statRisk">0</h3>
            </div>
            <div class="card p-6 rounded-3xl">
                <p class="text-slate-400 text-sm font-medium mb-1">Active Campaigns</p>
                <h3 class="text-3xl font-bold text-blue-400" id="statCampaigns">0</h3>
            </div>
            <div class="card p-6 rounded-3xl">
                <p class="text-slate-400 text-sm font-medium mb-1">High Risk Alerts</p>
                <h3 class="text-3xl font-bold text-red-500" id="statAlerts">0</h3>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="glass p-8 rounded-3xl">
                <h4 class="text-lg font-bold mb-6">Risk Score Distribution</h4>
                <canvas id="riskChart" height="200"></canvas>
            </div>
            <div class="glass p-8 rounded-3xl">
                <h4 class="text-lg font-bold mb-6">Simulation Success Rate</h4>
                <canvas id="campaignChart" height="200"></canvas>
            </div>
        </div>
    </main>

    <script src="../js/admin-dashboard.js"></script>
</body>
</html>
